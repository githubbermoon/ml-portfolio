<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosh (कोश) | Realms Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0edec;
            color: #1a1a1a;
        }

        /* The Grain Layer */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        h1, h2 { font-family: 'EB Garamond', serif; }
    </style>
</head>
<body class="min-h-screen p-8 md:p-20 flex flex-col items-center">
    
    <div class="max-w-2xl w-full">
        <header class="mb-16">
            <h1 class="text-4xl font-bold mb-4">Kosh (कोश)</h1>
            <p class="text-lg italic text-gray-700">A treasury of notes, references, essays, fragments, and field notes.</p>
        </header>

        <section class="bg-white/60 p-8 md:p-12 shadow-sm border border-black/5">
            <div class="grid grid-cols-2 gap-x-12 gap-y-12">
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1">Vedic Sciences</p>
                    <h2 class="text-xl font-bold">Theoretical Notes</h2>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1">Ancient Sciences</p>
                    <h2 class="text-xl font-bold">Builds</h2>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1">Ananta Nīhāra</p>
                    <h2 class="text-xl font-bold">Inner-World Room</h2>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-1">Direction</p>
                    <h2 class="text-xl font-bold">Research Note</h2>
                </div>
            </div>
        </section>

        <footer class="mt-16 text-center text-[10px] uppercase tracking-[0.2em] text-gray-400">
            @himavat
        </footer>
    </div>
</body>
</html>
