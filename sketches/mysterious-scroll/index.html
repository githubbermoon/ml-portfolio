<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Realms Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap');
        
        /* Ancient Manuscript Vibe */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f4efea; 
            color: #2c2520;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        h1, h2 { font-family: 'EB Garamond', serif; }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        
        .parchment {
            background: #fdfcfb;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.05);
            border: 1px solid #dcd8d3;
        }
    </style>
</head>
<body class="p-8 md:p-20 max-w-4xl mx-auto">
    
    <!-- Hero -->
    <header class="mb-24">
        <h1 class="text-6xl font-bold tracking-tight mb-8">Kosh (कोश)</h1>
        <p class="text-2xl italic text-gray-800 leading-relaxed max-w-xl">
            A treasury of notes, references, essays, fragments, and field notes.
        </p>
    </header>

    <!-- Main Content -->
    <main class="parchment p-12">
        <div class="grid md:grid-cols-2 gap-12">
            <div class="space-y-12">
                <div class="group cursor-pointer">
                    <p class="mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Vedic Sciences</p>
                    <h3 class="text-2xl font-bold mb-2 group-hover:underline">Theoretical Notes</h3>
                </div>
                <div class="group cursor-pointer">
                    <p class="mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Ananta Nīhāra</p>
                    <h3 class="text-2xl font-bold mb-2 group-hover:underline">Inner-World Room</h3>
                </div>
            </div>

            <div class="border-l border-gray-300 pl-12 space-y-12">
                <div class="group cursor-pointer">
                    <p class="mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Ancient Sciences</p>
                    <h3 class="text-2xl font-bold mb-2 group-hover:underline">Builds</h3>
                </div>
                <div class="group cursor-pointer">
                    <p class="mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Direction</p>
                    <h3 class="text-2xl font-bold mb-2 group-hover:underline">Research Note</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-24 text-center mono text-[10px] uppercase tracking-[0.3em] text-gray-500">
        @himavat
    </footer>
</body>
</html>
